name: Publish tezca-mcp to PyPI

on:
  push:
    tags:
      - 'mcp-v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install dependencies and run tests
      working-directory: packages/mcp-server
      run: |
        uv sync --all-extras
        uv run pytest tests/ -v

    - name: Build package
      working-directory: packages/mcp-server
      run: |
        pip install build
        python -m build

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: packages/mcp-server/dist/

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        VERSION="${TAG#mcp-v}"
        gh release create "$TAG" \
          --title "tezca-mcp@${VERSION}" \
          --notes "Published tezca-mcp@${VERSION} to PyPI" \
          --latest
