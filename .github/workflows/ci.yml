name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Poetry
      run: |
        python -m pip install --upgrade pip
        pip install poetry

    - name: Install dependencies
      run: poetry install --no-interaction

    - name: Lint with black (check)
      run: poetry run black --check apps/ tests/ scripts/

    - name: Lint with isort (check)
      run: poetry run isort --check-only apps/ tests/ scripts/

    - name: Check File Sizes
      run: poetry run python scripts/utils/audit_file_sizes.py

    - name: Run Pytest with coverage
      run: poetry run pytest tests/ -v --cov=apps --cov-report=xml --cov-report=term --cov-fail-under=44
      env:
        PYTHONPATH: apps:.

    - name: Security audit (pip-audit)
      run: |
        pip install pip-audit
        pip-audit --ignore-vuln PYSEC-2024-62613

    - name: Upload backend coverage
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: backend-coverage-py${{ matrix.python-version }}
        path: coverage.xml

  test-frontend:
    name: Frontend Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']

    env:
      NPM_MADFAM_TOKEN: ${{ secrets.NPM_MADFAM_TOKEN }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --legacy-peer-deps

    - name: Lint web
      run: npm run lint --workspace=web

    - name: Lint admin
      run: npm run lint --workspace=admin

    - name: Build web
      run: npm run build --workspace=web

    - name: Build admin
      run: npm run build --workspace=admin

    - name: Run Web Vitest with coverage
      run: npx vitest run --coverage
      working-directory: apps/web

    - name: Run Admin Vitest
      run: npx vitest run
      working-directory: apps/admin

    - name: Run API Client tests
      run: npx vitest run
      working-directory: packages/api-client

    - name: Security audit (npm)
      run: npm audit --production --audit-level=high

    - name: Upload frontend coverage
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: frontend-coverage-node${{ matrix.node-version }}
        path: apps/web/coverage/

  test-mcp:
    name: MCP Server Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      uses: astral-sh/setup-uv@v4

    - name: Install dependencies
      working-directory: packages/mcp-server
      run: uv sync --all-extras

    - name: Run MCP tests
      working-directory: packages/mcp-server
      run: uv run pytest tests/ -v

  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    # E2E Phase 3 (active): docker-compose.e2e.yml with seeded DB + ES, blocking gate.
    # Playwright retries (2 in CI) handle transient flakes.
    env:
      NPM_MADFAM_TOKEN: ${{ secrets.NPM_MADFAM_TOKEN }}
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      PLAYWRIGHT_BASE_URL: http://localhost:3000

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --legacy-peer-deps

    - name: Install Playwright Chromium
      run: npx playwright install chromium --with-deps
      working-directory: apps/web

    - name: Start E2E infrastructure
      run: docker compose -f docker-compose.e2e.yml up -d --build
      timeout-minutes: 10

    - name: Wait for services
      run: |
        timeout 120 bash -c 'until curl -fs http://localhost:8000/api/v1/stats/; do sleep 2; done'
        timeout 60 bash -c 'until curl -fs http://localhost:3000; do sleep 2; done'

    - name: Run Playwright tests
      run: npx playwright test --project=chromium
      working-directory: apps/web

    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: apps/web/playwright-report/

    - name: Stop E2E infrastructure
      if: always()
      run: docker compose -f docker-compose.e2e.yml down -v

  publish-sdk:
    name: Publish @tezca/api-client
    runs-on: ubuntu-latest
    needs: [test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Check if api-client changed
      id: changed
      run: |
        if git diff --name-only HEAD~1 HEAD | grep -q '^packages/api-client/'; then
          echo "changed=true" >> "$GITHUB_OUTPUT"
        else
          echo "changed=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Set up Node.js
      if: steps.changed.outputs.changed == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Check if version already published
      if: steps.changed.outputs.changed == 'true'
      id: version
      run: |
        PKG_VERSION=$(node -p "require('./packages/api-client/package.json').version")
        echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
          -H "Authorization: Bearer ${{ secrets.NPM_MADFAM_TOKEN }}" \
          "https://npm.madfam.io/@tezca%2fapi-client/$PKG_VERSION")
        if [ "$HTTP_CODE" = "200" ]; then
          echo "published=true" >> "$GITHUB_OUTPUT"
          echo "Version $PKG_VERSION already published, skipping"
        else
          echo "published=false" >> "$GITHUB_OUTPUT"
          echo "Version $PKG_VERSION not yet published"
        fi

    - name: Install dependencies
      if: steps.changed.outputs.changed == 'true' && steps.version.outputs.published == 'false'
      working-directory: packages/api-client
      run: npm install
      env:
        NPM_MADFAM_TOKEN: ${{ secrets.NPM_MADFAM_TOKEN }}

    - name: Build
      if: steps.changed.outputs.changed == 'true' && steps.version.outputs.published == 'false'
      working-directory: packages/api-client
      run: npm run build

    - name: Run tests
      if: steps.changed.outputs.changed == 'true' && steps.version.outputs.published == 'false'
      working-directory: packages/api-client
      run: npx vitest run

    - name: Verify no external @tezca/lib dependency
      if: steps.changed.outputs.changed == 'true' && steps.version.outputs.published == 'false'
      working-directory: packages/api-client
      run: |
        if grep -r "require.*@tezca/lib" dist/ 2>/dev/null || grep -r "from.*@tezca/lib" dist/ 2>/dev/null; then
          echo "ERROR: @tezca/lib appears as external import in dist/"
          exit 1
        fi
        echo "OK: @tezca/lib is fully self-contained"

    - name: Publish
      if: steps.changed.outputs.changed == 'true' && steps.version.outputs.published == 'false'
      working-directory: packages/api-client
      run: npm publish
      env:
        NPM_MADFAM_TOKEN: ${{ secrets.NPM_MADFAM_TOKEN }}

    - name: Tag and create GitHub Release
      if: steps.changed.outputs.changed == 'true' && steps.version.outputs.published == 'false'
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        TAG="api-client-v${{ steps.version.outputs.version }}"
        git tag "$TAG"
        git push origin "$TAG"
        gh release create "$TAG" \
          --title "@tezca/api-client@${{ steps.version.outputs.version }}" \
          --notes "Published @tezca/api-client@${{ steps.version.outputs.version }} to npm.madfam.io" \
          --latest
